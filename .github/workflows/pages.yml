name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "codon/**"
      - "reader/**"
      - "docs/**"
      - "shell/**"
      - ".intron.toml"
      - "mise.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-linux-gnu.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron install wasi-sdk 32
          intron install wasmtime 43.0.1
          intron default wasmtime 43.0.1

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve phenotype tag
        id: phenotype
        run: |
          TAG=$(grep -E '"github.com/misut/phenotype"' reader/exon.toml \
            | sed -E 's/.*"([0-9.]+)".*/v\1/')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build codon (release)
        run: |
          eval "$(intron env)"
          cd codon && exon build --release --target wasm32-wasi

      - name: Build reader (release)
        run: |
          eval "$(intron env)"
          cd reader && exon build --release --target wasm32-wasi

      - name: Assemble dist/
        run: |
          eval "$(intron env)"
          wasmtime --dir=. codon/.exon/wasm32-wasi/release/codon build docs dist
          cp shell/index.html dist/index.html
          cp shell/codon.js   dist/codon.js
          cp reader/.exon/wasm32-wasi/release/reader dist/reader.wasm
          curl -sSfL \
            "https://raw.githubusercontent.com/misut/phenotype/${{ steps.phenotype.outputs.tag }}/shim/phenotype.js" \
            -o dist/phenotype.js
          ls -la dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
